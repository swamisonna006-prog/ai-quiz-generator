<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-mesh"></div>
    
    <main class="app-container">
        <!-- Setup Screen -->
        <section id="setup-section" class="active glass-panel">
            <header class="app-header">
                <div class="logo">
                     <span class="material-symbols-rounded icon-accent">quiz</span>
                     <h1>AI Quiz Generator</h1>
                </div>
                <p>Upload a document or paste text to generate an interactive quiz instantly.</p>
            </header>

            <div class="quiz-settings">
                <div class="setting-group">
                    <label for="difficulty-select">Difficulty</label>
                    <select id="difficulty-select">
                        <option value="easy">Easy</option>
                        <option value="moderate" selected>Moderate</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="question-count">Number of Questions</label>
                    <input type="number" id="question-count" min="1" max="20" value="5">
                </div>
                <div class="setting-group topic-group">
                    <label for="topic-focus">Topic Focus (Optional)</label>
                    <input type="text" id="topic-focus" placeholder="e.g. Biology, History or leave blank for all">
                </div>
            </div>

            <div class="input-tabs">
                <button class="tab-btn active" data-tab="upload">Upload Document</button>
                <button class="tab-btn" data-tab="text">Paste Text</button>
            </div>

            <div class="tab-content active" id="tab-upload">
                <div class="drop-zone" id="drop-zone">
                    <span class="material-symbols-rounded upload-icon">cloud_upload</span>
                    <p>Drag & Drop your document here</p>
                    <span class="divider">or</span>
                    <label for="file-upload" class="browse-btn">Browse Files</label>
                    <input type="file" id="file-upload" hidden accept=".pdf,.doc,.docx,.txt">
                    <p class="file-name" id="file-name"></p>
                </div>
            </div>

            <div class="tab-content" id="tab-text">
                <div class="text-input-container">
                    <textarea id="source-text" placeholder="Paste the content you want to generate a quiz from here..."></textarea>
                </div>
            </div>

            <button id="generate-btn" class="primary-btn">
                <span class="material-symbols-rounded">auto_awesome</span>
                Generate Quiz
            </button>
            <div id="loading-spinner" class="spinner hidden"></div>
        </section>

        <!-- Quiz Screen -->
        <section id="quiz-section" class="glass-panel hidden">
             <header class="quiz-header">
                <div class="quiz-progress">
                    <span id="question-counter">Question 1 of 5</span>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress-bar" style="width: 20%;"></div>
                    </div>
                </div>
                <button id="restart-btn" class="icon-btn" title="Restart">
                     <span class="material-symbols-rounded">restart_alt</span>
                </button>
             </header>

             <div class="question-container">
                 <h2 id="question-text">Loading question...</h2>
                 
                 <div class="options-container" id="options-container">
                     <!-- Options dynamically injected here -->
                 </div>
             </div>

             <footer class="quiz-footer">
                 <button id="prev-btn" class="secondary-btn" disabled>Previous</button>
                 <button id="next-btn" class="primary-btn">Next</button>
             </footer>
             
             <!-- Results Screen within Quiz Section -->
             <div id="results-container" class="hidden">
                 <div class="results-content">
                     <span class="material-symbols-rounded success-icon">emoji_events</span>
                     <h2>Quiz Completed!</h2>
                     <p>Your Score: <span id="score-display">0/0</span></p>

                     <!-- New Analysis Report Section -->
                     <div id="learning-report-container" class="hidden">
                         <h3>Learning Analysis <span class="material-symbols-rounded">analytics</span></h3>
                         <div id="analysis-loading" class="spinner"></div>
                         <div id="analysis-content"></div>
                     </div>

                     <button id="play-again-btn" class="primary-btn">Create Another Quiz</button>
                 </div>
             </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
